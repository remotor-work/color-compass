<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Color Compass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="topbar panel">
      <div>
        <p class="micro-label">Color Compass</p>
        <h1>Palette Control</h1>
      </div>
      <div class="readout">
        <strong id="heroHex">#ff6b6b</strong>
        <span id="heroHsl">HSL(0, 80%, 67%)</span>
      </div>
    </section>

    <section class="wheel-panel panel">
      <div class="wheel-head">
        <span class="micro-label">Touch wheel</span>
        <div class="swatch-preview" id="heroSwatch"></div>
      </div>

      <div class="wheel-wrap">
        <div class="color-wheel" id="colorWheel" aria-label="Цветовой круг"></div>
      </div>

      <div class="tone-panel">
        <div class="tone-bar" id="toneBar" aria-label="Шкала светлоты">
          <div class="tone-thumb" id="toneThumb"></div>
        </div>
        <div class="tone-labels">
          <span>dark</span>
          <span>light</span>
        </div>
      </div>
    </section>

    <section class="controls panel">
      <div class="control-grid">
        <label class="mini-field">
          <span>HEX</span>
          <input id="hexInput" type="text" value="#ff6b6b" maxlength="7" spellcheck="false">
        </label>

        <label class="mini-field mini-field-color">
          <span>Pick</span>
          <input id="nativeColorInput" type="color" value="#ff6b6b" aria-label="Выберите цвет">
        </label>

        <label class="mini-field slider-field">
          <span>Hue <strong id="hueValue">0°</strong></span>
          <input id="hueSlider" type="range" min="0" max="360" value="0">
        </label>

        <label class="mini-field slider-field">
          <span>Sat <strong id="saturationValue">80%</strong></span>
          <input id="saturationSlider" type="range" min="0" max="100" value="80">
        </label>

        <label class="mini-field slider-field">
          <span>Light <strong id="lightnessValue">67%</strong></span>
          <input id="lightnessSlider" type="range" min="0" max="100" value="67">
        </label>
      </div>

      <div class="scheme-strip" id="schemeStrip" aria-label="Методы подбора"></div>

      <div class="status-line">
        <strong id="schemeTitle">Monochrome</strong>
        <span id="schemeDescription"></span>
      </div>
    </section>

    <section class="palette-panel panel">
      <div class="palette-head">
        <span class="micro-label">Palette</span>
        <span class="micro-label">tap to copy</span>
      </div>
      <div class="palette-grid" id="paletteGrid"></div>
    </section>

    <section class="theory-panel panel">
      <div class="palette-head">
        <span class="micro-label">Theory</span>
        <span class="micro-label">scheme examples</span>
      </div>
      <div class="theory-grid" id="theoryGrid"></div>
    </section>
  </main>

  <template id="paletteCardTemplate">
    <article class="palette-card">
      <button type="button" class="palette-swatch-button">
        <span class="palette-swatch"></span>
        <span class="palette-copy">copy</span>
      </button>
      <div class="palette-meta">
        <h2></h2>
        <p class="palette-hex"></p>
        <p class="palette-hsl"></p>
      </div>
    </article>
  </template>

  <template id="theoryCardTemplate">
    <article class="theory-card">
      <div class="theory-card-head">
        <h2></h2>
        <p class="theory-copy"></p>
      </div>
      <div class="theory-preview">
        <div class="theory-wheel">
          <div class="theory-wheel-core"></div>
        </div>
        <div class="theory-swatches"></div>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
